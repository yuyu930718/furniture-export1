<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "git-gateway",
            branch: "main"
          },
          media_folder: "images",
          public_folder: "/images",
          collections: [
            {
              name: "products",
              label: "Products",
              folder: "_products",
              create: true,
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Image", name: "image", widget: "image" },
                { label: "Description", name: "description", widget: "text" }
              ]
            }
          ]
        }
      })
    </script>
  </body>
</html>
